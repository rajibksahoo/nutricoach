1spring:
  application:
    name: nutricoach

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate   # Liquibase owns the schema — never let Hibernate modify it
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8080}
  servlet:
    context-path: /

app:
  jwt:
    secret: ${JWT_SECRET}          # Base64-encoded 256-bit key
    expiry-hours: 72

  msg91:
    auth-key: ${MSG91_AUTH_KEY}
    template-id: ${MSG91_TEMPLATE_ID}
    sender-id: NUTRIC
    dev-mode: ${MSG91_DEV_MODE:false}

  wati:
    api-endpoint: ${WATI_API_ENDPOINT}
    api-token: ${WATI_API_TOKEN}

  razorpay:
    key-id: ${RAZORPAY_KEY_ID}
    key-secret: ${RAZORPAY_KEY_SECRET}
    webhook-secret: ${RAZORPAY_WEBHOOK_SECRET}

  aws:
    region: ap-south-1
    s3:
      bucket: ${S3_BUCKET_NAME}
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}

  openai:
    api-key: ${OPENAI_API_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.nutricoach: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

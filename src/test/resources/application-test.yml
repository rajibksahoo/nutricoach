spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/nutricoach_test
    driver-class-name: org.postgresql.Driver
    username: nutricoach
    password: nutricoach
  jpa:
    hibernate:
      ddl-auto: validate          # Liquibase owns the schema — Hibernate only validates
    open-in-view: false
    show-sql: false
  liquibase:
    enabled: true
    drop-first: true              # Drop schema and re-apply all changesets — clean state every run
    change-log: classpath:db/changelog/db.changelog-master.xml

app:
  cors:
    allowed-origins: http://localhost:3000
  jwt:
    secret: bnV0cmljb2FjaC10ZXN0LWp3dC1zZWNyZXQta2V5ISE=
    expiry-hours: 1
  msg91:
    auth-key: test
    template-id: test
    sender-id: TEST
    dev-mode: false               # keep cooldown active — AuthIntegrationTest checks it
  wati:
    api-endpoint: http://localhost
    api-token: local-test-token   # "local-" prefix → WatiService skips real API calls
  razorpay:
    key-id: test
    key-secret: test
    webhook-secret: test
    dev-mode: true                # always use stub — avoids real Razorpay calls and duplicate sub IDs
    plan-ids:
      starter: plan_test_starter
      professional: plan_test_professional
      enterprise: plan_test_enterprise
  aws:
    region: ap-south-1
    s3:
      bucket: test-bucket
    access-key: local-test-key    # "local-" prefix → S3Service skips real AWS calls
    secret-key: local-test-secret
  openai:
    api-key: local-test-key       # "local-" prefix → AiMealPlanService uses stub response
